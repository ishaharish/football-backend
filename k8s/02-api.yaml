apiVersion: v1
kind: Secret
metadata:
  name: api-secret
type: Opaque
stringData:
  connection-string: "Server=football-mysql;Port=3306;Database=football-db;User=root;Password=rootpassword;"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: football-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: football-api
  template:
    metadata:
      labels:
        app: football-api
    spec:
      containers:
        - name: football-api
          image: ishaacr.azurecr.io/football-backend:latest
          env:
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: connection-string
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: football-api
spec:
  type: LoadBalancer
  selector:
    app: football-api
  ports:
    - port: 8080
      targetPort: 8080
